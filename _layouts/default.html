<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} — {% endif %}CloudSci AI</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | escape }}">
    <meta name="theme-color" content="#faf9f5">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="{{ page.url | absolute_url }}">
    <link rel="alternate" type="application/rss+xml" title="CloudSci AI" href="{{ '/feed.xml' | absolute_url }}">
    <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
    <link rel="stylesheet" href="{{ '/styles.css' | relative_url }}">
    <script>try{const t=localStorage.getItem('cloudsci-theme');if(t==='light'||t==='dark')document.documentElement.dataset.theme=t}catch(e){}</script>
    <script src="{{ '/theme.js' | relative_url }}" defer></script>
    <meta property="og:type" content="{% if page.layout == 'post' %}article{% else %}website{% endif %}">
    <meta property="og:site_name" content="CloudSci AI">
    <meta property="og:title" content="{{ page.title | default: site.title | escape }}">
    <meta property="og:description" content="{{ page.description | default: site.description | strip_html | escape }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta name="twitter:card" content="summary_large_image">
    {% if page.layout == 'post' %}<meta property="article:published_time" content="{{ page.date | date_to_xmlschema }}">{% endif %}
  </head>
  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>
    {% include blog-header.html %}
    <main id="main-content">{{ content }}</main>
    {% include blog-footer.html %}
  </body>
</html>
